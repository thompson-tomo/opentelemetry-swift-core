name: Build and Test

on: 
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      should-lint-pods: ${{ steps.check.outputs.should-lint-pods }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Check if the workflow should run
        id: check
        run: |
          git diff --name-only origin/${{ github.base_ref }} HEAD | grep -q "Sources/" && echo "should-run=true" >> "$GITHUB_OUTPUT" || echo "should-run=false" >> "$GITHUB_OUTPUT"
          git diff --name-only origin/${{ github.base_ref }} HEAD | grep -qE "(Sources/|\.podspec$)" && echo "should-lint-pods=true" >> "$GITHUB_OUTPUT" || echo "should-lint-pods=false" >> "$GITHUB_OUTPUT"


  FormattingLint: 
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: SwiftFormat
        run: echo swiftformat --lint `git diff --name-only HEAD^1 HEAD` --reporter github-actions-log

  SwiftLint:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: GitHub Action for SwiftLint (Only files changed in the PR)
        uses: norio-nomura/action-swiftlint@9f4dcd7fd46b4e75d7935cf2f4df406d5cae3684 # 3.2.1
        env:
          args: --strict
          DIFF_BASE: ${{ github.base_ref }}
  macOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: 16.4
    - name: Build and Test for macOS
      run: swift test --enable-code-coverage
    - name: Upload Code coverage
      run: |
        curl -Os https://uploader.codecov.io/latest/macos/codecov
        chmod +x codecov
        xcrun llvm-cov export -ignore-filename-regex="pb\.swift|grpc\.swift" -format="lcov" .build/debug/opentelemetry-swift-corePackageTests.xctest/Contents/MacOS/opentelemetry-swift-corePackageTests -instr-profile .build/debug/codecov/default.profdata > .build/debug/codecov/coverage_report.lcov
        ./codecov -f .build/debug/codecov/coverage_report.lcov
  iOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Resolve simulator
      id: ios-sim
      run: |
        UDID=$(./Scripts/ci/resolve-simulator.sh iOS)
        echo "destination=platform=iOS Simulator,id=$UDID" >> "$GITHUB_OUTPUT"
    - name: Build for iOS
      run: make build-for-testing-ios IOS_DESTINATION='${{ steps.ios-sim.outputs.destination }}'
    - name: Test for iOS
      run: make test-without-building-ios IOS_DESTINATION='${{ steps.ios-sim.outputs.destination }}'
  tvOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Resolve simulator
      id: tvos-sim
      run: |
        UDID=$(./Scripts/ci/resolve-simulator.sh tvOS)
        echo "destination=platform=tvOS Simulator,id=$UDID" >> "$GITHUB_OUTPUT"
    - name: Build for tvOS
      run: make build-for-testing-tvos TVOS_DESTINATION='${{ steps.tvos-sim.outputs.destination }}'
    - name: Test for tvOS
      run: make test-without-building-tvos TVOS_DESTINATION='${{ steps.tvos-sim.outputs.destination }}'
  watchOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Resolve simulator
      id: watchos-sim
      run: |
        UDID=$(./Scripts/ci/resolve-simulator.sh watchOS)
        echo "destination=platform=watchOS Simulator,id=$UDID" >> "$GITHUB_OUTPUT"
    - name: Build for watchOS
      run: make build-for-testing-watchos WATCHOS_DESTINATION='${{ steps.watchos-sim.outputs.destination }}'
    - name: Test for watchOS
      run: make test-without-building-watchos WATCHOS_DESTINATION='${{ steps.watchos-sim.outputs.destination }}'
  visionOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Resolve simulator
      id: visionos-sim
      run: |
        UDID=$(./Scripts/ci/resolve-simulator.sh visionOS)
        echo "destination=platform=visionOS Simulator,id=$UDID" >> "$GITHUB_OUTPUT"
    - name: Build for visionOS
      run: make build-for-testing-visionos VISIONOS_DESTINATION='${{ steps.visionos-sim.outputs.destination }}'
    - name: Test for visionOS
      run: make test-without-building-visionos VISIONOS_DESTINATION='${{ steps.visionos-sim.outputs.destination }}'
  CocoaPodLint:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-lint-pods == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: 16.4
      - name: Lint CocoaPods specs
        run: |
          pod lib lint OpenTelemetry-Swift-Api.podspec --allow-warnings
          pod lib lint OpenTelemetry-Swift-Sdk.podspec --allow-warnings --include-podspecs=OpenTelemetry-Swift-Api.podspec
          pod lib lint OpenTelemetry-Swift-StdoutExporter.podspec --allow-warnings --include-podspecs="OpenTelemetry-Swift-{Api,Sdk}.podspec"

  linux:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    container: swift:6.1@sha256:4c6af6663ed2316002a3b38ff5505a1fc1f2749ec31e84936c32dd336713c569
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build tests for Linux
        run: swift build --build-tests
      - name: Run tests for Linux
        run: swift test
  required-status-checks:
    needs: 
      - FormattingLint
      - SwiftLint
      - macOS
      - iOS
      - tvOS
      - watchOS
      - visionOS
      - linux
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all required jobs passed
        run: |
          if [[ ${{ needs.SwiftLint.result }} == 'failure' || \
          ${{ needs.FormattingLint.result }} == 'failure' || \
          ${{ needs.macOS.result }} == 'failure' || \
          ${{ needs.iOS.result }} == 'failure' || \
          ${{ needs.tvOS.result }} == 'failure' || \
          ${{ needs.watchOS.result }} == 'failure' || \
          ${{ needs.visionOS.result }} == 'failure' || \
          ${{ needs.linux.result }} == 'failure' ]]; then
            echo "One or more required jobs failed. Failing the workflow."
            exit 1
          else
            echo "All required jobs passed/skipped."
          fi
  
